services:
  postgres:
    image: postgres:16-alpine
    container_name: kiosque-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kiosque
      POSTGRES_PASSWORD: kiosque_dev_password
      POSTGRES_DB: kiosque_dev
    ports:
      - '5432:5432'
    volumes:
      - kiosque_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kiosque -d kiosque_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kiosque-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - kiosque_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kiosque_postgres_data:
  kiosque_redis_data:
